<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Updating Mnemonica Trainer…</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        text-align: center;
      }
      p {
        max-width: 320px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div>
      <p>Updating Mnemonica Trainer…</p>
      <p style="color: #94a3b8; font-size: 14px">Clearing old cached files. One moment.</p>
    </div>
    <script>
      (async function () {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (r) { return r.unregister(); }));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }
        } catch (e) {
          console.warn(e);
        }
        var base = location.pathname.replace(/reset\.html$/, '');
        location.replace(base + '?fresh=' + Date.now());
      })();
    </script>
  </body>
</html>
