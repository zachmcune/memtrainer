name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static PWA
        run: npm run build
        env:
          # Must match your GitHub repo name (case-sensitive).
          VITE_BASE_PATH: /memtrainer/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry Pages deploy after transient failure
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Verify deploy succeeded
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed twice. Re-run this workflow from the Actions tab."
          exit 1
