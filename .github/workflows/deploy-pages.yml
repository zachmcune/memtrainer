name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static PWA
        run: npm run build
        env:
          # Must match your GitHub repo name (case-sensitive).
          VITE_BASE_PATH: /memtrainer/
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}

      - name: Point GitHub Pages at the gh-pages branch
        run: |
          gh api --method PUT "repos/${{ github.repository }}/pages" \
            -f build_type=legacy \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/" \
            && echo "Pages source set to gh-pages branch." \
            || echo "::warning::Could not set Pages source automatically. In GitHub: Settings → Pages → Deploy from branch gh-pages (/)."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish built app to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          commit_message: 'Deploy PWA from ${{ github.sha }}'
